<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Superconducktors | FTC Robotics</title>
    <meta name="description" content="Upgrading from LEGO to Metal. The FTC Team Superconducktors are assembling.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particle-container"></div>
    
    <main class="container">
        <div class="glass-card" id="main-card">
            <div class="glow-effect" id="glow"></div>
            
            <div class="content">
                <div class="logo-container">
                    <img src="assets/logo.png" alt="Superconducktors Logo" class="floating-logo">
                    <div class="logo-shadow"></div>
                </div>
                
                <h1 class="title">
                    <span class="gradient-text">SUPER</span>CONDUCKTORS
                </h1>
                <div class="badge">FTC Team</div>
                
                <p class="subtitle">Upgrading from LEGO to Metal.</p>
                
                <div class="terminal">
                    <div class="terminal-header">
                        <span class="dot red"></span>
                        <span class="dot yellow"></span>
                        <span class="dot green"></span>
                    </div>
                    <div class="terminal-body">
                        <p class="typewriter">> System initialization...</p>
                        <p class="typewriter delay-1">> Reticulating splines...</p>
                        <p class="typewriter delay-2">> The Conducktors are evolving.</p>
                        <p class="typewriter delay-3 highlight">> Status: ASSEMBLING (Coming Soon)</p>
                        <span class="cursor">_</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
